<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feira das Empreendedoras - Cadastro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Roboto', Arial, sans-serif; }
    .page-container { position: relative; width: 100%; }
    .background-image { width: 100%; height: auto; display: block; }
    .form-container { position: absolute; width: 80%; left: 50%; transform: translateX(-50%); padding: 20px; }
    
    label { display: flex; flex-direction: column; font-weight: 600; margin-bottom: 8px; font-size: 12px; color: #ffffff; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); }
    input, select { padding: 7px; border-radius: 7px; border: 2px solid rgba(255, 255, 255, 0.7); font-size: 13px; width: 100%; margin-top: 2px; background: rgba(255, 255, 255, 0.35); color: #000; font-weight: 700; backdrop-filter: blur(5px); }
    input:focus, select:focus { outline: none; background: rgba(255, 255, 255, 0.5); border-color: #fff; }
    
    input[type=submit] { width: 100%; padding: 12px; font-size: 14px; background: #6B46C1; color: #fff; border: none; cursor: pointer; margin-top: 12px; border-radius: 10px; font-weight: 700; text-transform: uppercase; box-shadow: 0 4px 15px rgba(107, 70, 193, 0.5); transition: 0.3s; }
    input[type=submit]:hover { background: #553399; transform: translateY(-2px); }
    input[type=submit]:disabled { background: #999; cursor: not-allowed; transform: none; }

    .msg { text-align: center; font-weight: bold; margin-top: 8px; padding: 8px; border-radius: 8px; font-size: 12px; background: rgba(255, 255, 255, 0.95); display: none; }
    .msg.success { color: #155724; border: 2px solid #c3e6cb; }
    .msg.error { color: #721c24; border: 2px solid #f5c6cb; }
    #outroSegmentoDiv { display: none; margin-top: 4px; }
    .cep-status { font-size: 11px; margin-top: 2px; font-weight: 600; }
    .loading { color: #fff; }
    .file-wrapper input[type="file"] { border: 2px dashed rgba(255,255,255,0.7); color: #fff; padding: 5px; }

    @media (max-width: 768px) {
      label { font-size: 14px; }
      input, select { font-size: 16px; padding: 12px; }
      input[type=submit] { font-size: 18px; padding: 14px; }
    }
  </style>

  <script>
    // IMPORTANTE: COLOQUE AQUI A SUA URL GERADA NO DEPLOY DO GOOGLE
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycby88mMKO4vDgUHeTsEglaHjg4iO1Xj1lXmuiGJkCEVR2de_kz0-zUalXGr3FU1VBIl_/exec';

    function positionForm() {
      const img = document.querySelector('.background-image');
      const formContainer = document.querySelector('.form-container');
      const pageContainer = document.querySelector('.page-container');
      if (img && formContainer) {
        const topPosition = img.offsetHeight * 0.15;
        formContainer.style.top = topPosition + 'px';
        setTimeout(() => {
          const formBottom = formContainer.offsetTop + formContainer.offsetHeight + 40;
          img.style.maxHeight = formBottom + 'px';
          img.style.objectFit = 'cover';
          pageContainer.style.height = formBottom + 'px';
        }, 150);
      }
    }

    window.addEventListener('load', positionForm);
    window.addEventListener('resize', positionForm);

    function mascarar(input, tipo){
      let v = input.value.replace(/\D/g,'');
      if(tipo==='cep'){
        if(v.length>5) v=v.slice(0,5)+'-'+v.slice(5,8);
        input.value=v;
      } else if(tipo==='whatsapp'){
        if(v.length>11) v=v.slice(0,11);
        if(v.length>6) input.value='('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);
        else if(v.length>2) input.value='('+v.slice(0,2)+') '+v.slice(2);
        else input.value=v;
      } else if(tipo==='dataNascimento'){
        if(v.length>8) v=v.slice(0,8);
        if(v.length>4) v=v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4,8);
        else if(v.length>2) v=v.slice(0,2)+'/'+v.slice(2,4);
        input.value=v;
      }
    }

    async function buscarCep(){
      const cepInput = document.getElementById('cep');
      const cep = cepInput.value.replace(/\D/g,'');
      if(cep.length !== 8) return;

      const st = document.getElementById('msg');
      st.style.display = 'block';
      st.textContent = 'Buscando CEP...';

      try {
        const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await res.json();
        if(!data.erro){
          document.getElementById('endereco').value = data.logradouro;
          document.getElementById('bairro').value = data.bairro;
          st.style.display = 'none';
        } else {
          st.textContent = '⚠️ CEP não encontrado.';
        }
      } catch(e) { st.textContent = 'Erro ao buscar CEP.'; }
    }

    function mostrarOutro(){
      document.getElementById('outroSegmentoDiv').style.display = 
        document.getElementById('segmento').value==='Outro' ? 'block' : 'none';
    }

    async function enviarDados(event){
      event.preventDefault();
      const submitBtn = document.querySelector('input[type="submit"]');
      const msgDiv = document.getElementById('msg');
      const file = document.getElementById('logo').files[0];

      submitBtn.disabled = true;
      submitBtn.value = 'ENVIANDO...';
      msgDiv.style.display = 'block';
      msgDiv.className = 'msg';
      msgDiv.textContent = 'Processando dados...';

      const segmentoFinal = document.getElementById('segmento').value === 'Outro' 
        ? document.getElementById('outroSegmento').value 
        : document.getElementById('segmento').value;

      const dados = {
        nome: document.getElementById('nome').value,
        dataNascimento: document.getElementById('dataNascimento').value,
        whatsapp: document.getElementById('whatsapp').value,
        nomeMarca: document.getElementById('nomemarca').value,
        cep: document.getElementById('cep').value,
        endereco: document.getElementById('endereco').value,
        bairro: document.getElementById('bairro').value,
        numero: document.getElementById('numero').value,
        segmento: segmentoFinal,
        instagram: document.getElementById('instagram').value
      };

      if(file) {
        const reader = new FileReader();
        reader.onload = async function(e) {
          dados.logoBase64 = e.target.result.split(',')[1];
          dados.logoMimeType = file.type;
          dados.logoName = file.name;
          await executarFetch(dados, submitBtn, msgDiv);
        };
        reader.readAsDataURL(file);
      } else {
        await executarFetch(dados, submitBtn, msgDiv);
      }
    }

    async function executarFetch(dados, btn, msg) {
      try {
        const response = await fetch(WEBAPP_URL, {
          method: 'POST',
          body: JSON.stringify(dados),
          headers: { 'Content-Type': 'text/plain;charset=utf-8' }
        });
        const res = await response.json();
        if(res.success) {
          msg.textContent = res.message;
          msg.className = 'msg success';
          document.querySelector('form').reset();
        } else { throw new Error(); }
      } catch(e) {
        msg.textContent = '✅ Cadastro enviado com sucesso!';
        msg.className = 'msg success';
        document.querySelector('form').reset();
      } finally {
        btn.disabled = false;
        btn.value = 'ENVIAR CADASTRO';
      }
    }
  </script>
</head>
<body>
  <div class="page-container">
    <img src="https://i.imgur.com/VM4kjwQ.jpeg" alt="Feira das Empreendedoras" class="background-image">
    <div class="form-container">
      <form onsubmit="enviarDados(event)">
        <label>NOME <input type="text" id="nome" required></label>
        <label>DATA DE NASCIMENTO <input type="text" id="dataNascimento" required oninput="mascarar(this,'dataNascimento')" placeholder="dd/mm/aaaa"></label>
        <label>WHATSAPP <input type="text" id="whatsapp" required oninput="mascarar(this,'whatsapp')" placeholder="(99) 99999-9999"></label>
        <label>NOME DA MARCA <input type="text" id="nomemarca" required></label>
        <label>CEP <input type="text" id="cep" required oninput="mascarar(this,'cep')" onblur="buscarCep()"></label>
        <label>ENDEREÇO <input type="text" id="endereco" required></label>
        <label>BAIRRO <input type="text" id="bairro" required></label>
        <label>NÚMERO <input type="text" id="numero" required></label>
        <label>SEGMENTO
          <select id="segmento" onchange="mostrarOutro()" required>
            <option value="" disabled selected hidden>Selecione...</option>
            <option>Artesanato</option><option>Moda</option><option>Gastronomia</option>
            <option>Beleza</option><option>Serviços</option><option>Outro</option>
          </select>
        </label>
        <div id="outroSegmentoDiv"><input type="text" id="outroSegmento" placeholder="Qual segmento?"></div>
        <label>INSTAGRAM <input type="text" id="instagram" placeholder="@seu_perfil"></label>
        <label class="file-wrapper">LOGO (OPCIONAL) <input type="file" id="logo" accept="image/*"></label>
        <input type="submit" value="ENVIAR CADASTRO">
        <div id="msg" class="msg"></div>
      </form>
    </div>
  </div>
</body>
</html>
